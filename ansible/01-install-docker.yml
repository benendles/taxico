---
- name: Provision Docker on the Taxico server
  hosts: taxico
  become: true
  tasks:
    - name: Update the apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present
    - name: Ensure the Docker service is started and enabled on boot
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
    - name: Report the installed Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
    - name: Show the Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"
