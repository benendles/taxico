apiVersion: v1
kind: Namespace
metadata:
  name: taxico
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: taxico
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: taxico }
            - { name: POSTGRES_USER, value: taxico }
            - { name: POSTGRES_PASSWORD, value: taxico }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "taxico"] }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: taxico
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: taxico
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: taxico
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth }
  template:
    metadata:
      labels: { app: auth }
    spec:
      containers:
        - name: auth
          image: taxico-auth:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4001 }]
          env:
            - { name: PORT, value: "4001" }
            - { name: JWT_SECRET, value: "taxico-dev-secret-change-me" }
            - { name: DATABASE_URL, value: "postgres://taxico:taxico@postgres:5432/taxico" }
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: taxico
spec:
  selector: { app: auth }
  ports: [{ port: 4001, targetPort: 4001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: traffic }
  template:
    metadata:
      labels: { app: traffic }
    spec:
      containers:
        - name: traffic
          image: taxico-traffic:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4002 }]
          env:
            - { name: PORT, value: "4002" }
            - { name: CORS_ORIGINS, value: "http://72.62.93.99:30001,http://72.62.93.99:30000" }
            - { name: REDIS_URL, value: "redis://redis:6379" }
          readinessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: traffic
  namespace: taxico
spec:
  selector: { app: traffic }
  ports: [{ port: 4002, targetPort: 4002 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: route
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: route }
  template:
    metadata:
      labels: { app: route }
    spec:
      containers:
        - name: route
          image: taxico-route:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4003 }]
          env:
            - { name: PORT, value: "4003" }
            - { name: TRAFFIC_URL, value: "http://traffic:4002" }
          readinessProbe:
            httpGet: { path: /health, port: 4003 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4003 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: route
  namespace: taxico
spec:
  selector: { app: route }
  ports: [{ port: 4003, targetPort: 4003 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: prediction }
  template:
    metadata:
      labels: { app: prediction }
    spec:
      containers:
        - name: prediction
          image: taxico-prediction:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4004 }]
          env:
            - { name: PORT, value: "4004" }
            - { name: TRAFFIC_URL, value: "http://traffic:4002" }
          readinessProbe:
            httpGet: { path: /health, port: 4004 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4004 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: prediction
  namespace: taxico
spec:
  selector: { app: prediction }
  ports: [{ port: 4004, targetPort: 4004 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: taxico-gateway:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4000 }]
          env:
            - { name: PORT, value: "4000" }
            - { name: JWT_SECRET, value: "taxico-dev-secret-change-me" }
            - { name: CORS_ORIGINS, value: "http://72.62.93.99:30001" }
            - { name: AUTH_URL, value: "http://auth:4001" }
            - { name: TRAFFIC_URL, value: "http://traffic:4002" }
            - { name: ROUTE_URL, value: "http://route:4003" }
            - { name: PREDICTION_URL, value: "http://prediction:4004" }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: taxico
spec:
  type: NodePort
  selector: { app: gateway }
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: taxico
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: taxico-web:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: "http://72.62.93.99:30000" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: taxico
spec:
  type: NodePort
  selector: { app: web }
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
